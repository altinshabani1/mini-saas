name: Docker Compose CI/CD

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'  # version tags like v1.0.0

jobs:
  deploy-with-docker-compose:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Deploy to Remote Server using Docker Compose
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Install Docker if not present
          if ! command -v docker &> /dev/null; then
            echo "Installing Docker..."
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi

          # Install Docker Compose v2 if not present
          if ! docker compose version &> /dev/null; then
            echo "Installing Docker Compose..."
            sudo curl -SL https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-linux-x86_64 -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi

          # Prepare working directory
          DEPLOY_DIR=~/mini-saas
          rm -rf $DEPLOY_DIR
          git clone https://github.com/${{ github.repository }} $DEPLOY_DIR
          cd $DEPLOY_DIR
          git checkout ${{ github.sha }}

          # Optional: create .env file if needed
          if [ ! -f backend/.env ]; then
            cat <<EOF > backend/.env
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=mini_saas
          EOF
                    fi

          # Run Docker Compose
          docker compose down || true
          docker compose up -d --build

    - name: Notify via Email on Success
      if: success()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "✅ Deployment Success - mini-saas"
        to: "enisimami@gmail.com"
        from: "GitHub Actions"
        body: "The app has been deployed via Docker Compose successfully."
